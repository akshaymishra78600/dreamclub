<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JAI CLUB VIP MEMBERS</title>

<style>
:root{
--accent:#35eadc;
--pink:#ff5e84;
}

*{box-sizing:border-box}

html,body{
margin:0;
background:linear-gradient(180deg,#022522 0%,#01231f 100%);
font-family:Arial,Helvetica,sans-serif;
color:#fff;
}

body{
display:flex;
justify-content:center;
}

.phone{
width:100%;
max-width:430px;
padding:10px 14px 12px;
}

.top-strip{
overflow:hidden;
background:var(--accent);
color:#003b38;
border-radius:999px;
padding:12px 0;
font-weight:900;
text-transform:uppercase;
}

.marquee{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:scrollLeft 12s linear infinite;
font-size:13px;
}

@keyframes scrollLeft{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

.card{
margin-top:10px;
background:linear-gradient(180deg,#0a4842,#053430);
border:2px solid #28e5d8;
border-radius:22px;
padding:12px;
}

.hero-img{
width:100%;
border-radius:16px;
}

.title{
margin:12px 0 4px;
text-align:center;
font-size:32px;
font-weight:900;
text-transform:uppercase;
}

.subtitle-wrap{
text-align:center;
margin-bottom:6px;
}

.subtitle{
font-size:13px;
opacity:.9;
}

.cta{
display:block;
margin:14px auto 0;
width:100%;
max-width:360px;
text-align:center;
text-decoration:none;
color:#002725;
background:linear-gradient(180deg,#4af2e6 0%,#24ddd0 100%);
border-radius:999px;
padding:15px 16px;
font-size:20px;
font-weight:900;
letter-spacing:1.5px;
text-transform:uppercase;
font-family:Georgia,"Times New Roman",serif;
-webkit-text-stroke:.4px #002725;
text-shadow:0 1px 0 rgba(0,0,0,.25);
}

.mini{
text-align:center;
margin-top:12px;
font-size:13px;
}

.hurry{
text-align:center;
margin-top:3px;
color:#35eadc;
font-size:16px;
font-weight:900;
}

.timer{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:12px;
}

.box{
background:#093a36;
border-radius:14px;
padding:14px 8px 12px;
text-align:center;
}

.num{
font-size:32px;
font-weight:900;
}

.label{
margin-top:3px;
color:var(--pink);
font-size:12px;
font-weight:800;
}

.benefits{
margin-top:12px;
display:grid;
gap:8px;
}

.benefit{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:14px;
font-weight:800;
text-align:center;
}

.icon{
width:20px;
height:20px;
background:gold;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:12px;
font-weight:900;
}

</style>
</head>

<body>
<main class="phone">

<div class="top-strip">
<div class="marquee">
VIP SURESHOT • LIMITED TIME • JOIN FAST • VIP SURESHOT • LIMITED TIME • JOIN FAST •
</div>
</div>

<section class="card">

<img class="hero-img"
src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop">

<h1 class="title">JAI CLUB VIP MEMBERS</h1>

<div class="subtitle-wrap">
🏆
<div class="subtitle">
JOIN FAST FOR FREE VIP ACCESS AND PREMIUM UPDATES
</div>
</div>

<a class="cta"
href="https://t.me/+-XqEKs424lwxNzY1"
onclick="fbq && fbq('track','Lead')">
JOIN HACK CHANNEL
</a>

<div class="mini">FREE VIP ACCESS</div>
<div class="hurry">HURRY UP! JOIN NOW</div>

<div class="timer">
<div class="box">
<div class="num" id="min">29</div>
<div class="label">MIN</div>
</div>

<div class="box">
<div class="num" id="sec">39</div>
<div class="label">SEC</div>
</div>
</div>

<div class="benefits">
<div class="benefit"><span class="icon">★</span>100% WINNING SURESHOT</div>
<div class="benefit"><span class="icon">★</span>100% LOSS RECOVERY</div>
<div class="benefit"><span class="icon">★</span>MONTHLY INCOME 30K–50K</div>
</div>

</section>
</main>

<script>
let m=29;
let s=39;

setInterval(()=>{
s--;
if(s<0){s=59;m--}
if(m<0){m=29;s=39}

document.getElementById("min").innerText=m;
document.getElementById("sec").innerText=s;

},1000);
</script>

</body>
</html>
